name: demo-smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  demo-smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run demo smoke test (build + sakila validation)
        run: make demo-smoke
