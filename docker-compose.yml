services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - NL2SQL_API_URL=${NL2SQL_API_URL:-http://host.docker.internal:8080}
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Mount .env automatically via docker-compose's env_file support
    # (already loaded by wsgi.py via python-dotenv for local runs)

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
