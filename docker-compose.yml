services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - NL2SQL_API_URL=${NL2SQL_API_URL:-http://host.docker.internal:8080}
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Mount .env automatically via docker-compose's env_file support
    # (already loaded by wsgi.py via python-dotenv for local runs)

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    environment:
      - NGINX_CLIENT_BODY_TIMEOUT_SECONDS=${NGINX_CLIENT_BODY_TIMEOUT_SECONDS:-900}
      - NGINX_PROXY_READ_TIMEOUT_SECONDS=${NGINX_PROXY_READ_TIMEOUT_SECONDS:-900}
      - NGINX_PROXY_CONNECT_TIMEOUT_SECONDS=${NGINX_PROXY_CONNECT_TIMEOUT_SECONDS:-900}
      - NGINX_PROXY_SEND_TIMEOUT_SECONDS=${NGINX_PROXY_SEND_TIMEOUT_SECONDS:-900}
      - NGINX_SSL_SESSION_TIMEOUT_SECONDS=${NGINX_SSL_SESSION_TIMEOUT_SECONDS:-900}
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - app
